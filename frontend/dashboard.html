<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Dashboard</title>

  <style>

    body{
      margin:0;
      padding:0;
      font-family:Arial;
      background:#111;
      color:white;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      background:#1e1e1e;
      padding:40px;
      border-radius:10px;
      text-align:center;
      width:350px;
    }

    h1{
      margin-bottom:10px;
    }

    p{
      color:#aaa;
      margin-bottom:25px;
    }

    button{
      padding:12px 20px;
      border:none;
      background:red;
      color:white;
      border-radius:5px;
      cursor:pointer;
      font-size:16px;
    }

  </style>

</head>

<body>

  <div class="container">

    <h1>
      Dashboard
    </h1>

    <p>
      Login Successful
    </p>

    <button onclick="logout()">
      Logout
    </button>

  </div>

  <script>

    const token =
      localStorage.getItem("token");

    if(!token){

      window.location.href =
        "login.html";

    }

    function logout(){

      localStorage.removeItem("token");

      alert("Logged out");

      window.location.href =
        "login.html";

    }

  </script>

</body>

</html>
